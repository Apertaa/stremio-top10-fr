name: flixpatrol-reachability
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Contournements depuis l'infra GitHub
        run: |
          echo "=========================================="
          echo "A) NETFLIX OFFICIEL (top10.netflix.com) — accessible depuis GitHub ?"
          code=$(curl -s -o /tmp/n.tsv -w "%{http_code}" "https://top10.netflix.com/data/all-weeks-countries.tsv")
          echo "   HTTP $code, $(wc -c </tmp/n.tsv) octets"
          echo "   1re ligne : $(head -1 /tmp/n.tsv)"
          echo "   lignes France : $(grep -c '^France' /tmp/n.tsv || echo 0)"
          echo "=========================================="
          echo "B) r.jina.ai (reader proxy gratuit) -> FlixPatrol Netflix France ?"
          code=$(curl -s -o /tmp/j.txt -w "%{http_code}" "https://r.jina.ai/https://flixpatrol.com/top10/netflix/france/")
          echo "   HTTP $code, $(wc -c </tmp/j.txt) octets"
          echo "   marqueurs TOP 10 : $(grep -oE 'TOP 10 (Movies|TV Shows)' /tmp/j.txt | tr '\n' ' ')"
          echo "   exemples titres : $(grep -iE 'maternal|office romance|canailles' /tmp/j.txt | head -2 | tr '\n' ' ')"
          echo "=========================================="
          echo "C) allorigins (proxy CORS gratuit) -> FlixPatrol Netflix France ?"
          code=$(curl -s -o /tmp/a.html -w "%{http_code}" "https://api.allorigins.win/raw?url=https%3A%2F%2Fflixpatrol.com%2Ftop10%2Fnetflix%2Ffrance%2F")
          echo "   HTTP $code, $(wc -c </tmp/a.html) octets"
          echo "   titres : $(grep -oE 'href=\"/title/[^\"]+\">[^<]+' /tmp/a.html | sed 's/.*>//' | head -5 | tr '\n' '|')"
          echo "=========================================="
          echo "Test terminé."
